<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Academic Webpage" />
    <meta name="author" content="yixin0313" />
    <title id="title"></title>

    <!-- Icon -->
    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />

    <!-- Bootstrap icons-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Noto+Serif+SC:wght@400;700&family=Fraunces:opsz,wght@9..144,400;9..144,700;9..144,900&family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <!-- Core theme CSS -->
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />

    <!-- Bootstrap core JS-->
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>

    <!-- For Compatability -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>

    <!-- Markdown -->
    <script type="text/javascript" src="static/js/marked.min.js"></script>

    <!-- Mathematics -->
    <script>
        // See https://docs.mathjax.org/en/latest/index.html for more details.
        MathJax = {
            tex: {
                packages: {},              // extensions to use
                inlineMath: [              // start/end delimiter pairs for in-line math
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [             // start/end delimiter pairs for display math
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: false,      // use \$ to produce a literal dollar sign
                processEnvironments: true, // process \begin{xxx}...\end{xxx} outside math mode
                processRefs: true,         // process \ref{...} outside of math mode
                digits: /^(?:[0-9]+(?:\{,\}[0-9]{3})*(?:\.[0-9]*)?|\.[0-9]+)/,    // pattern for recognizing numbers
                tags: 'all',              // or 'ams' or 'all'
                tagSide: 'right',          // side for \tag macros
                tagIndent: '0.8em',        // amount to indent tags
                useLabelIds: true,         // use label name rather than tag for ids
                maxMacros: 10000,          // maximum number of macro substitutions per expression
                maxBuffer: 5 * 1024,       // maximum size for the internal TeX string (5K)
                // baseURL:                   // URL for use with links to tags (when there is a <base> tag in effect)
                // (document.getElementsByTagName('base').length === 0) ? '' : String(document.location).replace(/#.*$/, ''),
                formatError:               // function called when TeX syntax errors occur
                    (jax, err) => jax.formatError(err)
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script"
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <!-- Core JS-->
    <script type="text/javascript" src="static/js/scripts.js"></script>
    <script type="text/javascript" src="static/js/js-yaml.min.js"></script>

</head>

<body id="page-top" class="neo-brutalist" data-theme="neo">
    <div class="noise-overlay"></div>
    <div class="custom-cursor"></div>
    <!-- Glassmorphism 背景色块 (仅 glass 主题显示) -->
    <div class="glass-blobs" aria-hidden="true">
        <span class="blob blob-1"></span>
        <span class="blob blob-2"></span>
        <span class="blob blob-3"></span>
    </div>
    <!-- Vaporwave 背景 (仅 vaporwave 主题显示) -->
    <div class="vapor-bg" aria-hidden="true">
        <div class="vapor-sun"></div>
        <div class="vapor-grid"></div>
        <div class="vapor-scanlines"></div>
    </div>
    <!-- Navigation-->
    <nav class="header navbar navbar-expand-lg navbar-light shadow-sm" id="mainNav">
        <div class="container px-5">
            <a id="page-top-title" class="navbar-brand fw-bold gradient-text" href="#page-top"></a>
            <!-- <a href="#page-top"><img src="static/assets/img/CUMT_LOGO.svg" style="width: 11rem;"></a> -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive">
                <ul class="navbar-nav ms-auto me-4 my-3 my-lg-0">
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#home">HOME</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#publications">PUBLICATIONS</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#experience">EXPERIENCE</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link me-lg-3" href="#awards">AWARDS</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Top Section -->
    <section class="top-section">
        <div class="container px-5">
            <div class="row align-items-center">
                <div class="col-lg-8">
                    <h2 id="top-section-bg-text"></h2>
                </div>
                <div class="col-lg-4 text-center">
                    <div id="avatar">
                        <img src="static/assets/img/photo.png">
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- Top Section -->

    <!-- Home -->
    <section id="home">
        <div class="container px-5">
            <div class="glass-effect">
                <header>
                    <h2 id="home-subtitle" class="gradient-text"> </h2>
                </header>
                <div class="main-body" id="home-md"></div>
            </div>
        </div>
    </section>
    <!-- Home -->

    <!-- Publications -->
    <section id="publications">
        <div class="container px-5">
            <div class="glass-effect">
                <header>
                    <h2 id="publications-subtitle" class="gradient-text">PUBLICATIONS</h2>
                </header>
                <div class="main-body" id="publications-md"></div>
            </div>
        </div>
    </section>
    <!-- Publications  -->

    <!-- Experience -->
    <section id="experience">
        <div class="container px-5">
            <div class="glass-effect">
                <header>
                    <h2 id="experience-subtitle" class="gradient-text"> EXPERIENCE </h2>
                </header>
                <div class="main-body" id="experience-md"></div>
            </div>
        </div>
    </section>
    <!-- Experience -->

    <!-- Awards -->
    <section id="awards">
        <div class="container px-5">
            <div class="glass-effect">
                <header>
                    <h2 id="awards-subtitle" class="gradient-text">AWARDS </h2>
                </header>
                <div class="main-body" id="awards-md"></div>
            </div>
        </div>
    </section>
    <!-- Awards -->

    <!-- Footer-->
    <footer class="text-center py-5">
        <div class="container px-5">
            <div class="small">
                <div id="copyright-text" class="mb-2 text-white"></div>
                <a id="github-link" href="https://github.com/senli1073">Github</a>
                <span class="mx-1 text-white">&middot;</span>
                <a id="license-link"
                    href="https://github.com/senli1073/senli1073.github.io/blob/main/LICENSE">License</a>
            </div>
        </div>
    </footer>

    <!-- Control Panel (BGM / Theme / Cmd+K) -->
    <div class="control-panel" id="controlPanel">
        <button class="ctrl-btn" id="bgmToggle" title="背景音乐" aria-label="Toggle BGM">
            <span class="ctrl-icon">♪</span><span class="ctrl-label">BGM</span>
        </button>
        <div class="theme-picker">
            <button class="ctrl-btn" id="themeToggle" title="切换主题" aria-label="Pick theme" aria-haspopup="true" aria-expanded="false">
                <span class="ctrl-icon">◑</span><span class="ctrl-label">THEME</span>
            </button>
            <div class="theme-menu" id="themeMenu" hidden>
                <button class="theme-opt" data-theme="neo"><span class="theme-swatch swatch-neo"></span>骚粉 NEO</button>
                <button class="theme-opt" data-theme="neo-dark"><span class="theme-swatch swatch-neo-dark"></span>NEO DARK</button>
                <button class="theme-opt" data-theme="glass"><span class="theme-swatch swatch-glass"></span>GLASS</button>
                <button class="theme-opt" data-theme="swiss"><span class="theme-swatch swatch-swiss"></span>SWISS</button>
                <button class="theme-opt" data-theme="bento"><span class="theme-swatch swatch-bento"></span>BENTO</button>
                <button class="theme-opt" data-theme="vaporwave"><span class="theme-swatch swatch-vaporwave"></span>VAPORWAVE</button>
            </div>
        </div>
        <button class="ctrl-btn" id="cmdPaletteBtn" title="命令面板 (Cmd+K)" aria-label="Command palette">
            <span class="ctrl-icon">⌘</span><span class="ctrl-label">CMD</span>
        </button>
    </div>

    <!-- Command Palette -->
    <div class="cmd-palette" id="cmdPalette" hidden>
        <div class="cmd-palette-inner">
            <input type="text" id="cmdInput"
                placeholder="输入跳转：home / publications / experience / awards / bgm / theme..."
                autocomplete="off" spellcheck="false">
            <ul class="cmd-results" id="cmdResults"></ul>
            <div class="cmd-hint">↑↓ 选择 · ↵ 跳转 · ESC 关闭</div>
        </div>
    </div>

</body>

</html>
